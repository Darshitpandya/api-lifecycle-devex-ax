openapi: "3.1.0"
info:
  title: Bare API
  version: "1.0.0"
paths:
  /items:
    get:
      responses:
        "200":
          description: OK
    post:
      responses:
        "201":
          description: Created
  /items/{id}:
    delete:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
